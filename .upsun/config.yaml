applications:
  keds:
    container_profile: HIGH_MEMORY
    source:
      root: "keds"

    type: "php:8.4"

    runtime:
      extensions:
        - redis

    build:
      flavor: composer

    hooks:
      deploy: |
        set -e
        bash scripts/deploy.sh
      post_deploy: |
        set -e
        bash scripts/post-deploy.sh

    relationships:
      database: "kedsdb:mysql"
      rediscache: "redis:redis"

    web:
      locations:
        "/":
          root: "wordpress"
          passthru: "/index.php"
          index:
            - "index.php"
          expires: 600
          scripts: true
          allow: true
          rules:
            ^/composer\.(json|lock)$:
              allow: false
            ^/license\.txt$:
              allow: false
            ^/readme\.html$:
              allow: false
            ^/xmlrpc\.php$:
              allow: false
        "/wp-content/cache":
          root: "wordpress/wp-content/cache"
          scripts: false
          allow: false
          rules:
            # Autoptimize writes content-hashed css/js bundles here that the
            # frontend loads directly; everything else in the mount stays blocked.
            '\.(css|js)$':
              allow: true
              expires: 1y
        "/wp-content/uploads":
          root: "wordpress/wp-content/uploads"
          scripts: false
          allow: true

    dependencies:
      php:
        wp-cli/wp-cli-bundle: "^2.12"
        psy/psysh: "^0.12"

    mounts:
      "wordpress/wp-content/cache":
        source: storage
        source_path: "cache"
      "wordpress/wp-content/uploads":
        source: storage
        source_path: "uploads"
      # Staging area for database imports (Pantheon content syncs). Outside
      # the web root on purpose: dumps must never be web-accessible.
      "db-import":
        source: storage
        source_path: "db-import"

    crons:
      wp-cron:
        spec: "*/5 * * * *"
        cmd: "cd wordpress && wp cron event run --due-now"

    # Runtime operation to import a staged content dump without a code push:
    # neither `environment:redeploy` nor an empty commit (identical tree ID,
    # build reused) runs deploy hooks. Runs the full deploy sequence, so the
    # import is followed by update-db and the deploy migrations exactly as in
    # a real deploy. Unlike a deploy, crons are not paused while it runs.
    #   upsun operation:run content-import -e <env>
    operations:
      content-import:
        role: admin
        commands:
          start: bash scripts/deploy.sh

services:
  kedsdb:
    type: mariadb:11.8

  redis:
    type: redis:8.0

routes:
  "https://{default}/":
    type: upstream
    upstream: "keds:http"
    cache:
      enabled: true
      cookies:
        - "/^wordpress_logged_in_/"
        - "/^wordpress_sec_/"
        - "wordpress_test_cookie"
        - "/^wp-settings-/"
        - "/^wp-postpass/"
        - "/^wp_woocommerce_session_/"
        - "woocommerce_items_in_cart"
        - "woocommerce_cart_hash"
        - "PHPSESSID"

  # Redirect www to the canonical apex. Needed once www resolves to Upsun at
  # cutover; without a matching route, www requests would hit no upstream.
  "https://www.{default}/":
    type: redirect
    to: "https://{default}/"
