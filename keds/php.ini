; Sized for ~28,400 PHP files in /app (WordPress core + 45 active plugins).
; Platform defaults (4,000 files / 64MB) overflow badly and force
; recompilation on nearly every request.
opcache.max_accelerated_files = 50000
opcache.memory_consumption = 512
opcache.interned_strings_buffer = 64

; /app is immutable between deploys and the writable mounts cannot
; execute PHP, so never re-stat sources.
opcache.validate_timestamps = 0

realpath_cache_size = 4096K
realpath_cache_ttl = 600
