# Daily open-PR digest, delivered via GitHub notifications — no SMTP needed.
#
# Composes a markdown report (.github/ci/pr-report.sh) of every open PR —
# ready-to-merge with suggested merge order, auto-merge armed, failing,
# conflicted, in progress — and publishes it as a NEW dated issue assigned
# to Vinnie, closing the previous digest issue. Issue creation reliably
# triggers an email notification (actions-bot comments proved not to);
# route the artetecha org to v@artetecha.com under Settings →
# Notifications → Custom routing. An empty PR queue creates no issue and
# closes any open digest as "queue empty".

name: Daily PR report

on:
  schedule:
    # Off the :00/:30 marks — GitHub drops cron runs scheduled at busy minutes.
    - cron: '17 6 * * *'   # 06:17 UTC daily — after dependabot (05:00) and thim (05:43) have raised the day's PRs
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: write

env:
  REPORT_TITLE: "📬 Daily PR digest"
  REPORT_LABEL: daily-report
  MENTION: "@vincenzo"

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Compose report
        id: report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          .github/ci/pr-report.sh > /tmp/pr-report.md
          echo "date=$(date -u +%F)" >> "$GITHUB_OUTPUT"
          cat /tmp/pr-report.md

      # One issue PER RUN: issue creation reliably triggers an email
      # notification (comments from the actions bot proved not to), and the
      # previous digest issue is closed so exactly one is open at a time.
      - name: Publish digest as a new issue, close the previous one
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COUNT: ${{ steps.report.outputs.count }}
          DATE: ${{ steps.report.outputs.date }}
        run: |
          gh label create "$REPORT_LABEL" --repo "$GITHUB_REPOSITORY" \
            --description "Daily PR digest issues" \
            --color 0e8a16 --force 2>/dev/null || true

          previous=$(gh issue list --repo "$GITHUB_REPOSITORY" --label "$REPORT_LABEL" \
            --state open --json number --jq '.[].number')

          new_issue=""
          if [ "$COUNT" != "0" ]; then
            {
              echo "$MENTION"
              echo
              cat /tmp/pr-report.md
            } > /tmp/issue-body.md
            new_url=$(gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "$REPORT_TITLE — $DATE" \
              --label "$REPORT_LABEL" --assignee "${MENTION#@}" \
              --body-file /tmp/issue-body.md)
            new_issue="${new_url##*/}"
            echo "created issue #$new_issue"
          fi

          for old in $previous; do
            [ "$old" = "$new_issue" ] && continue
            if [ -n "$new_issue" ]; then
              gh issue close "$old" --repo "$GITHUB_REPOSITORY" \
                --comment "Superseded by #$new_issue."
            else
              gh issue close "$old" --repo "$GITHUB_REPOSITORY" \
                --comment "The PR queue is empty — nothing to report today."
            fi
          done
