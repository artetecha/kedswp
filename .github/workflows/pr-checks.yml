# Tier 1: hermetic build + WordPress boot smoke test.
#
# Runs on every PR with no secrets, so dependabot and fork PRs behave
# identically. Catches: broken composer resolution, PHP 8.4 syntax errors in
# updated plugin/theme code, activation fatals, and boot-time fatals — before
# anything reaches the Upsun preview environment tier (pr-e2e.yml).

name: PR checks

on:
  pull_request:

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Unit tests for the first-party Upsun mu-plugin package. The 8.1 leg
  # enforces the package's PHP floor (the repo-level lint runs on 8.4 only);
  # the package targets >=8.1 so it stays consumable outside this project.
  upsun-mu-plugin:
    name: upsun-mu-plugin (php ${{ matrix.php }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        php: ['8.1', '8.4']
    defaults:
      run:
        working-directory: keds/packages/upsun-mu-plugin
    steps:
      - uses: actions/checkout@v7

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none

      # No committed lock file: dev deps resolve per PHP version.
      - name: Composer install
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: PHPUnit
        run: vendor/bin/phpunit

  hermetic:
    name: hermetic
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: keds
    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_DATABASE: wordpress
          MARIADB_USER: wp
          MARIADB_PASSWORD: wp
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30
      redis:
        image: redis:8.0
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30

    steps:
      - uses: actions/checkout@v7

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mysqli, redis, igbinary, gd, intl, zip, mbstring, curl, exif
          # NOTE: do not set opcache.enable_cli — it slows every one-shot
          # wp-cli call and segfaulted PHP during host-webfonts-local
          # activation (seen on run 4). The persistent wp server process
          # already gets opcache via the default opcache.enable=1; first
          # renders are slow because of real generation work, hence the
          # generous curl timeouts below.
          ini-values: memory_limit=512M
          tools: composer, wp-cli
          coverage: none

      - name: Validate composer manifests
        run: |
          # --no-check-all: exact version pins are deliberate here; --strict
          # still fails on schema errors and an out-of-date composer.lock.
          composer validate --strict --no-check-all --no-check-publish
          python3 <<'PY'
          # Path packages are pinned "*" in composer.json (the vendored
          # composer.json is the version authority), so the invariants are:
          # every vendored package is required, and its LOCKED version
          # matches the vendored manifest (catches a botched update commit
          # that changed files without refreshing the lock, or vice versa).
          import json, pathlib, sys
          req = json.load(open("composer.json"))["require"]
          lock = json.load(open("composer.lock"))
          locked = {p["name"]: p["version"] for p in lock["packages"]}
          bad, count = [], 0
          for cj in sorted(pathlib.Path("private-packages").glob("*/*/composer.json")):
              pkg = json.load(cj.open())
              count += 1
              name, version = pkg["name"], pkg.get("version")
              if name not in req:
                  bad.append(f"{name}: vendored but missing from composer.json require")
              elif locked.get(name) != version:
                  bad.append(f"{name}: vendored {version!r} vs locked {locked.get(name)!r}")
          if bad:
              print("Private packages out of sync:", *bad, sep="\n  ")
              sys.exit(1)
          print(f"{count} private packages consistent (require + lock)")
          PY

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ hashFiles('keds/composer.lock') }}
          restore-keys: composer-

      - name: Composer install (exercises the postbuild scripts too)
        run: composer install --no-interaction --no-progress --prefer-dist

      # Full lint, not diff-based: composer-mediated plugin updates change
      # zero files in the git diff. Excludes below are for shipped test
      # fixtures that are intentionally invalid PHP.
      - name: PHP 8.4 lint of wp-content
        run: |
          composer global require php-parallel-lint/php-parallel-lint:^1.4 --no-interaction --quiet
          "$(composer global config bin-dir --absolute --quiet)/parallel-lint" \
            -j "$(nproc)" --no-progress \
            wordpress/wp-content/plugins \
            wordpress/wp-content/themes \
            wordpress/wp-content/mu-plugins

      - name: Write CI WordPress config
        run: |
          cp ../.github/ci/wp-config-local.php wp-config-local.php
          printf 'path: wordpress\n' > wp-cli.local.yml
          # Short-circuit ALL outgoing mail: wp-mail-smtp intercepts wp_mail
          # and can spin retrying against blocked external HTTP (hung the
          # activation step for 30 min on PR #12 after the 4.8.x bump).
          printf '<?php\nadd_filter( "pre_wp_mail", "__return_true", 1 );\n' \
            > wordpress/wp-content/mu-plugins/ci-disable-mail.php

      # All wp-cli steps below run from wordpress/ to mirror production
      # (/app/wordpress). Running from keds/ breaks plugins that load their
      # bundled autoloader via a relative `include 'vendor/autoload.php'`:
      # include_path's "." would resolve it to the PROJECT autoloader in
      # keds/vendor/ instead (seen with learnpress-course-review).
      - name: Install WordPress
        working-directory: keds/wordpress
        run: |
          wp core install \
            --url=http://127.0.0.1:8080 \
            --title="KEDS CI" \
            --admin_user=ci-admin \
            --admin_password="ci-$(head -c8 /dev/urandom | xxd -p)" \
            --admin_email=ci@example.invalid \
            --skip-email
          wp theme activate eduma

      # The upsun-loader.php shim is what makes WP load the packaged
      # mu-plugin from its subdirectory; a missing shim fails silently, so
      # assert the plugin's API exists and correctly no-ops off-platform.
      - name: Upsun mu-plugin loads and no-ops off-platform
        working-directory: keds/wordpress
        run: |
          wp eval 'exit( function_exists( "Upsun\\is_upsun" ) && ! Upsun\is_upsun() ? 0 : 1 );'
          wp upsun info | grep -q 'Not running on Upsun'

      - name: Activate production plugin set
        working-directory: keds/wordpress
        run: bash ../../.github/ci/activate-plugins.sh ../package-source-manifest.json

      - name: Pretty permalinks (LearnPress archive + REST routes)
        working-directory: keds/wordpress
        run: wp rewrite structure '/%postname%/'

      - name: Serve site
        working-directory: keds/wordpress
        run: |
          # Reset the debug log: the fatal gate below is for RENDER fatals.
          # Setup noise (notably a known wp-cli quirk where --context=admin
          # fatals in wp-admin/includes/menu.php on the null admin menu)
          # must not trip it; activation failures already gate separately.
          : > /tmp/wp-debug.log
          # Workers matter: plugins make loopback HTTP requests to the site
          # itself (font/CSS proxying); a single-threaded built-in server
          # deadlocks on those until default_socket_timeout (60s ×2 ≈ the
          # uniform 121s renders seen on runs 3-5).
          PHP_CLI_SERVER_WORKERS=4 wp server --host=127.0.0.1 --port=8080 &
          for i in $(seq 1 30); do
            curl -fsS -o /dev/null http://127.0.0.1:8080/wp-login.php && exit 0
            sleep 2
          done
          echo "ERROR: wp server did not come up" >&2
          exit 1

      - name: Smoke tests
        run: |
          set -x
          mkdir -p /tmp/smoke

          # NB: assertions use explicit `if`, not `! grep` — commands prefixed
          # with `!` are exempt from bash errexit and would never fail the job.
          fatal='There has been a critical error|Fatal error'

          # Homepage: 200 and no fatal markers (first render is uncached Eduma+Elementor — be patient).
          curl -fsS --max-time 300 http://127.0.0.1:8080/ -o /tmp/smoke/home.html
          if grep -Eqi "$fatal" /tmp/smoke/home.html; then echo "fatal on /" >&2; exit 1; fi

          # Login page renders its form.
          curl -fsS --max-time 60 http://127.0.0.1:8080/wp-login.php -o /tmp/smoke/login.html
          grep -q 'loginform' /tmp/smoke/login.html

          # LearnPress course archive exists and renders.
          curl -fsS --max-time 300 http://127.0.0.1:8080/courses/ -o /tmp/smoke/courses.html
          if grep -Eqi "$fatal" /tmp/smoke/courses.html; then echo "fatal on /courses/" >&2; exit 1; fi

          # REST API responds with valid JSON. Retried: PHP's built-in server
          # occasionally drops a worker mid-request on this endpoint
          # (curl 52 "empty reply" — observed ~once per 10-15 runs; the site
          # itself is fine, subsequent requests succeed).
          rest_ok=0
          for i in $(seq 1 5); do
            if curl -sS --max-time 120 http://127.0.0.1:8080/wp-json/ -o /tmp/smoke/rest.json \
              && [ -s /tmp/smoke/rest.json ] \
              && jq -e '.name' /tmp/smoke/rest.json > /dev/null; then
              rest_ok=1
              break
            fi
            echo "REST check attempt $i failed; retrying in 3s" >&2
            sleep 3
          done
          if [ "$rest_ok" -ne 1 ]; then
            echo "ERROR: REST API failed after 5 attempts" >&2
            echo "=== last /wp-json/ body ===" >&2
            [ -f /tmp/smoke/rest.json ] && head -c 2000 /tmp/smoke/rest.json >&2 || true
            echo "=== debug log tail ===" >&2
            [ -f /tmp/wp-debug.log ] && tail -n 100 /tmp/wp-debug.log >&2 || true
            exit 1
          fi

      - name: Fail on PHP fatals in the debug log
        # Fatals only: 30 premium plugins on PHP 8.4 emit deprecations —
        # that's report material, not a merge gate.
        run: |
          if [ -f /tmp/wp-debug.log ] && grep -E 'PHP Fatal|Uncaught' /tmp/wp-debug.log; then
            echo "ERROR: PHP fatals found in debug log" >&2
            exit 1
          fi

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: hermetic-diagnostics
          if-no-files-found: ignore
          path: |
            /tmp/wp-debug.log
            /tmp/smoke/
