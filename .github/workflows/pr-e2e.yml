# Tier 2: smoke tests against the Upsun PR preview environment.
#
# The Upsun GitHub integration builds an environment per PR (named pr-N) with
# a CLONE OF PRODUCTION DATA, and reports a commit status when deployed. This
# job waits for that status, discovers the environment URL, and runs a
# strictly read-only Playwright smoke suite against it.
#
# Fork PRs are skipped (no Upsun env is built for them by default; a skipped
# job still satisfies branch protection).
#
# TODO after the first real PR: pin UPSUN_STATUS_CONTEXT below to the exact
# status context string (capture with:
#   gh api repos/artetecha/kedswp/commits/<sha>/status --jq '.statuses[].context')
# and add the same context to the main ruleset's required checks.

name: PR E2E

on:
  pull_request:

concurrency:
  group: pr-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: read

jobs:
  e2e:
    name: e2e
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Wait for the Upsun environment
        id: upsun
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.number }}
          # Exact context confirmed on PR #3.
          UPSUN_STATUS_CONTEXT: "upsun"
          # Fallback URL discovery via the CLI needs UPSUN_CLI_TOKEN; the
          # primary path (status target_url) needs no secret at all.
          UPSUN_CLI_TOKEN: ${{ secrets.UPSUN_CLI_TOKEN }}
          TIMEOUT_MIN: "30"
        run: bash .github/ci/wait-for-upsun-env.sh

      - name: Wait for the environment to serve
        # The deploy hook (update-db, migrations) can still be running when
        # the status flips; cheap insurance. Preview envs sit behind Upsun's
        # project-level basic auth — credentials come from the
        # E2E_HTTP_USER/E2E_HTTP_PASS secrets (must exist in BOTH the Actions
        # and Dependabot secret stores; dependabot-triggered runs read the
        # latter).
        env:
          E2E_HTTP_USER: ${{ secrets.E2E_HTTP_USER }}
          E2E_HTTP_PASS: ${{ secrets.E2E_HTTP_PASS }}
        run: |
          url="${{ steps.upsun.outputs.url }}"
          auth=()
          if [ -n "$E2E_HTTP_USER" ]; then auth=(-u "$E2E_HTTP_USER:$E2E_HTTP_PASS"); fi
          for i in $(seq 1 24); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "${auth[@]}" "$url/") || code=000
            echo "attempt $i: HTTP $code"
            case "$code" in
              2*|3*) exit 0 ;;
            esac
            sleep 10
          done
          echo "ERROR: environment never served a non-error response" >&2
          exit 1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run smoke suite (read-only)
        working-directory: tests/e2e
        env:
          BASE_URL: ${{ steps.upsun.outputs.url }}
          E2E_HTTP_USER: ${{ secrets.E2E_HTTP_USER }}
          E2E_HTTP_PASS: ${{ secrets.E2E_HTTP_PASS }}
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          if-no-files-found: ignore
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
