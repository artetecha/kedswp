# Dependabot: free (wpackagist) composer packages + GitHub Actions.
#
# Notes:
# - wpackagist needs no `registries:` entry — dependabot's composer engine
#   reads the `repositories` array from keds/composer.json directly.
# - Path packages (keds/private-packages/*) are invisible to dependabot;
#   those are updated by .github/workflows/thim-update.yml instead.
# - Patch/minor wpackagist updates arrive as one grouped rolling PR and are
#   auto-merged when CI passes (see automerge.yml); majors arrive
#   individually and wait for human review.
# - Known gap: dependabot's handling of already-satisfying range constraints
#   (johnpbloch/wordpress-core "7.0.*", redis-cache "^2.0") is inconsistent
#   for composer — verify a core point release actually yields a PR.

version: 2
updates:
  - package-ecosystem: composer
    directory: "/keds"
    schedule:
      interval: daily
      time: "05:00"
      timezone: Europe/London
    versioning-strategy: increase
    open-pull-requests-limit: 10
    labels:
      - dependencies
    ignore:
      # Elementor 4.2.0 trips a PHP 8.4 deprecation (Atomic_Global_Styles::
      # get_cache_root_key() implicit-nullable param) whose shutdown log dump
      # contaminates wp-cli stdout and breaks the hermetic activation smoke
      # test (PR #90, 2026-07-21). Pin out ONLY 4.2.0 so the eventual fixed
      # release (4.2.1 / 4.3+) still flows through automatically.
      - dependency-name: "wpackagist-plugin/elementor"
        versions: ["4.2.0"]
    groups:
      wpackagist-minor-patch:
        patterns:
          - "wpackagist-*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies
